name: Optimize Images

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies (with legacy peer deps)
        run: npm install sharp --legacy-peer-deps

      - name: Run image optimization script
        run: node scripts/optimize-images.js

      - name: Auto-commit optimized images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 🤖 Auto-optimize images [skip ci]
          branch: main
          file_pattern: public/optimized/*
