'<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flavor Studios - Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0% { text-shadow: 0 0 10px rgba(156, 39, 176, 0.5); }
      50% { text-shadow: 0 0 20px rgba(156, 39, 176, 0.8); }
      100% { text-shadow: 0 0 10px rgba(156, 39, 176, 0.5); }
    }
    @keyframes gridMove {
      0% { background-position: 0px 0px; }
      100% { background-position: 30px 30px; }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0a0a14;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    .container {
      z-index: 10;
      padding: 2rem;
      max-width: 600px;
      background: rgba(10, 10, 20, 0.7);
      border-radius: 8px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(138, 43, 226, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: fadeIn 1s ease-out forwards;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #9c27b0;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
      color: #e0e0e0;
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
    }
    .logo {
      margin-bottom: 2rem;
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(90deg, #9c27b0, #3f51b5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 3px;
      font-family: 'Orbitron', sans-serif;
    }
    .error-code {
      font-size: 8rem;
      font-weight: bold;
      margin: 0;
      line-height: 1;
      background: linear-gradient(90deg, #9c27b0, #3f51b5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: float 6s infinite ease-in-out;
      font-family: 'Orbitron', sans-serif;
    }
    .button {
      display: inline-block;
      background: linear-gradient(90deg, #9c27b0, #3f51b5);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      text-decoration: none;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      border-radius: 4px;
      box-shadow: 0 4px 15px rgba(156, 39, 176, 0.4);
      position: relative;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
    }
    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(156, 39, 176, 0.6);
    }
    .button::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: rotate(45deg);
      transition: all 0.5s ease;
      opacity: 0;
    }
    .button:hover::after {
      left: 100%;
      opacity: 1;
      transition: all 0.5s ease;
    }
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(135deg, rgba(10, 10, 20, 0.9) 0%, rgba(10, 10, 20, 0.95) 100%),
        radial-gradient(circle at 50% 50%, rgba(63, 81, 181, 0.1) 0%, rgba(10, 10, 20, 0) 70%);
      z-index: -1;
    }
    .grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(rgba(63, 81, 181, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(63, 81, 181, 0.1) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 1;
      animation: gridMove 20s linear infinite;
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="grid"></div>
  <div class="container">
    <div class="logo">FLAVOR STUDIOS</div>
    <p class="error-code">404</p>
    <h1>Page Not Found</h1>
    <p>The scene you're looking for doesn't exist in our universe. Perhaps it was moved to another dimension or never existed at all.</p>
    <a href="https://www.flavorstudios.in/" class="button">Return to Home</a>
  </div>
</body>
