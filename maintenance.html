<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flavor Studios - Under Maintenance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0% { filter: drop-shadow(0 0 8px rgba(156, 39, 176, 0.6)); }
      50% { filter: drop-shadow(0 0 12px rgba(156, 39, 176, 0.8)); }
      100% { filter: drop-shadow(0 0 8px rgba(156, 39, 176, 0.6)); }
    }
    @keyframes gridMove {
      0% { background-position: 0px 0px; }
      100% { background-position: 30px 30px; }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes glow {
      0% { box-shadow: 0 0 5px rgba(156, 39, 176, 0.3); }
      50% { box-shadow: 0 0 15px rgba(156, 39, 176, 0.5); }
      100% { box-shadow: 0 0 5px rgba(156, 39, 176, 0.3); }
    }
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0a0a14;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    .container {
      z-index: 10;
      padding: 2rem;
      max-width: 600px;
      background: rgba(10, 10, 20, 0.7);
      border-radius: 8px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(138, 43, 226, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: fadeIn 1s ease-out forwards;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #9c27b0;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
      color: #e0e0e0;
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
    }
    .logo {
      margin-bottom: 2rem;
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(90deg, #9c27b0, #3f51b5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 3px;
      animation: pulse 2s infinite ease-in-out;
      font-family: 'Orbitron', sans-serif;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 1rem;
      animation: spin 20s linear infinite;
    }
    .status {
      background: rgba(156, 39, 176, 0.1);
      border: 1px solid rgba(156, 39, 176, 0.3);
      padding: 1rem;
      border-radius: 4px;
      margin: 1rem 0 2rem;
      color: #e0e0e0;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      animation: glow 2s infinite ease-in-out;
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
    }
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(135deg, rgba(10, 10, 20, 0.9) 0%, rgba(10, 10, 20, 0.95) 100%),
        radial-gradient(circle at 50% 50%, rgba(63, 81, 181, 0.1) 0%, rgba(10, 10, 20, 0) 70%);
      z-index: -1;
    }
    .grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(rgba(63, 81, 181, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(63, 81, 181, 0.1) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 1;
      animation: gridMove 20s linear infinite;
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="grid"></div>
  <div class="container">
    <div class="logo">FLAVOR STUDIOS</div>
    <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 15V17M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" stroke="url(#gradient1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="12" cy="12" r="3" stroke="url(#gradient1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <defs>
        <linearGradient id="gradient1" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#9c27b0" />
          <stop offset="100%" stop-color="#3f51b5" />
        </linearGradient>
      </defs>
    </svg>
    <h1>System Upgrade</h1>
    <p>We're enhancing the Flavor Studios experience. Our team is implementing new features that will take your journey to the next level.</p>
    <div class="status">Expected return: Soon™</div>
    <p>Thank you for your patience. The wait will be worth it.</p>
  </div>
</body>
