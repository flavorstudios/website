<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flavor Studios - You're Offline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0% { filter: drop-shadow(0 0 8px rgba(156, 39, 176, 0.6)); }
      50% { filter: drop-shadow(0 0 12px rgba(156, 39, 176, 0.8)); }
      100% { filter: drop-shadow(0 0 8px rgba(156, 39, 176, 0.6)); }
    }
    @keyframes gridMove {
      0% { background-position: 0px 0px; }
      100% { background-position: 30px 30px; }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0a0a14;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    .container {
      z-index: 10;
      padding: 2rem;
      max-width: 600px;
      background: rgba(10, 10, 20, 0.7);
      border-radius: 8px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(138, 43, 226, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: fadeIn 1s ease-out forwards;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: #9c27b0;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
      font-family: 'Orbitron', sans-serif;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
      color: #e0e0e0;
      font-family: 'Poppins', sans-serif;
      font-weight: 300;
    }
    .logo {
      margin-bottom: 2rem;
      font-size: 1.5rem;
      font-weight: bold;
      background: linear-gradient(90deg, #9c27b0, #3f51b5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 3px;
      animation: pulse 2s infinite ease-in-out;
      font-family: 'Orbitron', sans-serif;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 1rem;
      animation: float 3s infinite ease-in-out;
    }
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(135deg, rgba(10, 10, 20, 0.9) 0%, rgba(10, 10, 20, 0.95) 100%),
        radial-gradient(circle at 50% 50%, rgba(63, 81, 181, 0.1) 0%, rgba(10, 10, 20, 0) 70%);
      z-index: -1;
    }
    .grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(rgba(63, 81, 181, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(63, 81, 181, 0.1) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 1;
      animation: gridMove 20s linear infinite;
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="grid"></div>
  <div class="container">
    <div class="logo">FLAVOR STUDIOS</div>
    <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 1L23 23M16.72 11.06C17.54 11.45 18.29 12 18.94 12.65M5 12.55C5.24 12.38 5.5 12.23 5.77 12.1C7.2 11.5 8.85 11.44 10.4 12.18M10.71 5.05C11.7 4.92 12.7 4.92 13.69 5.05C16.59 5.41 19.09 7.14 20.45 9.86M1.42 9C2.5 7.16 4.2 5.61 6.38 4.79C7.64 4.32 8.96 4.1 10.27 4.1" stroke="url(#gradient1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8.53 16.11C9.55 15.73 10.67 15.73 11.7 16.11C12.5 16.41 13.18 16.94 13.66 17.66M12 20H12.01" stroke="url(#gradient1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <defs>
        <linearGradient id="gradient1" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#9c27b0" />
          <stop offset="100%" stop-color="#3f51b5" />
        </linearGradient>
      </defs>
    </svg>
    <h1>Connection Lost</h1>
    <p>Your journey through Flavor Studios has been temporarily interrupted. Please check your internet connection and try again.</p>
  </div>
</body>
