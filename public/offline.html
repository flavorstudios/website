<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Offline – Flavor Studios</title>
  <meta name="description" content="You are offline. Please check your internet connection to access the latest anime news, original stories, and games from Flavor Studios.">
  <meta name="robots" content="noindex, follow">

  <!-- Canonical -->
  <link rel="canonical" href="https://flavorstudios.in/offline">

  <!-- Open Graph -->
  <meta property="og:title" content="Offline – Flavor Studios">
  <meta property="og:description" content="You are offline. Please check your internet connection to access Flavor Studios.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://flavorstudios.in/offline">
  <meta property="og:site_name" content="Flavor Studios">
  <meta property="og:image" content="https://flavorstudios.in/cover.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Flavor Studios Offline Banner">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@flavorstudios">
  <meta name="twitter:title" content="Offline – Flavor Studios">
  <meta name="twitter:description" content="You are offline. Please check your internet connection to access Flavor Studios.">
  <meta name="twitter:image" content="https://flavorstudios.in/cover.jpg">

  <!-- Icons -->
  <link rel="icon" href="/favicon.ico">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Tailwind CSS via CDN (keeps the exact classes/design) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- JSON-LD Schema -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "@id": "https://flavorstudios.in/offline",
      "url": "https://flavorstudios.in/offline",
      "name": "Offline – Flavor Studios",
      "description": "You are offline. Please check your internet connection to access the latest anime news, original stories, and games from Flavor Studios."
    }
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-50 via-blue-50 to-purple-50 flex items-center justify-center px-4 py-8">
  <main class="max-w-4xl mx-auto text-center w-full">
    <!-- Offline Animation Heading -->
    <div class="mb-6 sm:mb-8">
      <div class="relative">
        <h1 class="text-5xl sm:text-7xl md:text-8xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-500 via-orange-500 to-yellow-500 animate-pulse">
          Offline
        </h1>
        <div class="absolute inset-0 text-5xl sm:text-7xl md:text-8xl font-bold text-blue-100 -z-10 transform translate-x-1 translate-y-1 sm:translate-x-2 sm:translate-y-2" aria-hidden="true">
          Offline
        </div>
      </div>
    </div>

    <!-- Main Message -->
    <section class="mb-8 sm:mb-12">
      <h2 class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-900 mb-4">
        You&apos;re Currently Offline
      </h2>
      <p class="text-base sm:text-lg text-gray-600 mb-6 max-w-2xl mx-auto leading-relaxed">
        It looks like you&apos;ve lost your internet connection. Don&apos;t
        worry—once you&apos;re back online, you&apos;ll be able to access
        all of our amazing content again!
      </p>

      <!-- Primary CTA Buttons -->
      <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 justify-center items-center mb-6 sm:mb-8">
        <button id="btn-reload"
          class="w-full sm:w-auto inline-flex items-center justify-center px-6 py-3 text-base font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow-lg transition-all duration-200">
          <svg class="mr-2 h-4 w-4 sm:h-5 sm:w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          Try Again
        </button>

        <button id="btn-back"
          class="w-full sm:w-auto inline-flex items-center justify-center px-6 py-3 text-base font-medium text-blue-700 bg-white border border-blue-200 hover:bg-blue-50 rounded-lg shadow-lg transition-all duration-200">
          <svg class="mr-2 h-4 w-4 sm:h-5 sm:w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Go Back
        </button>
      </div>
    </section>

    <!-- Help Section -->
    <section class="bg-white/80 backdrop-blur-sm rounded-2xl p-6 sm:p-8 border border-blue-100 shadow-lg">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">Connection Tips</h3>

      <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 justify-center">
        <button id="btn-check"
          class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-green-700 bg-white border border-green-200 hover:bg-green-50 rounded-lg transition-all duration-200">
          <svg class="mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          Check Connection
        </button>
      </div>

      <p id="connection-message" class="mt-4 text-sm text-green-700 hidden" aria-live="polite"></p>
    </section>

    <!-- Footer Message -->
    <footer class="mt-6 sm:mt-8 text-xs sm:text-sm text-gray-500">
      <p>Connection Status: Offline • Please Check Your Internet • Flavor Studios</p>
    </footer>
  </main>

  <script>
    (function () {
      const btnReload = document.getElementById('btn-reload');
      const btnBack = document.getElementById('btn-back');
      const btnCheck = document.getElementById('btn-check');
      const msg = document.getElementById('connection-message');

      btnReload.addEventListener('click', function () {
        window.location.reload();
      });

      btnBack.addEventListener('click', function () {
        window.history.back();
      });

      btnCheck.addEventListener('click', function () {
        if (navigator.onLine) {
          msg.textContent = 'You are online!';
        } else {
          msg.textContent = 'Still offline';
        }
        msg.classList.remove('hidden');
      });
    })();
  </script>
</body>
</html>
